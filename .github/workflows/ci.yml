name: CI - Tests and Deployment Gate

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Make Maven wrapper executable
        working-directory: app_frameworks
        run: chmod +x mvnw

      - name: Run backend tests
        working-directory: app_frameworks
        env:
          SPRING_PROFILES_ACTIVE: test
          JWT_SECRET: miclavesupersegurademinimo32caracteres123
          JWT_EXPIRATION_MS: 3600000
        run: >
         ./mvnw test -e -DtrimStackTrace=false
         -Dspring.profiles.active=test
         "-Dspring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL"
         -Dspring.datasource.driver-class-name=org.h2.Driver
         -Dspring.datasource.username=sa
         -Dspring.datasource.password=
         -Dspring.jps.hibernate.ddl-auto=create-drop
         -Dspring.jpa.database-platform=org.hibernate.dialect.H2Dialect
         -Dspring.flyway.enabled=false
      
      - name: Show surefire reports on failure
        if: failure()
        working-directory: app_frameworks
        run: |
          find target/surefire-reports -type f -maxdepth 1 -print -exec cat {} \;
      - name: Install frontend dependencies
        working-directory: app_frameworks_front
        run: npm ci

      - name: Run frontend unit and integration tests
        working-directory: app_frameworks_front
        run: npm run test -- --run

      - name: Install Playwright browsers
        working-directory: app_frameworks_front
        run: npx playwright install --with-deps chromium

      - name: Start backend
        working-directory: app_frameworks
        run: |
          ./mvnw spring-boot:run > backend.log 2>&1 &
          echo $! > backend.pid

      - name: Wait for backend
        run: |
          for i in {1..60}; do
            if curl -s http://127.0.0.1:8080 > /dev/null; then
              echo "Backend is up"
              exit 0
            fi
            sleep 2
          done
          echo "Backend did not start in time"
          exit 1

      - name: Start frontend
        working-directory: app_frameworks_front
        run: |
          npm run dev -- --host 0.0.0.0 > frontend.log 2>&1 &
          echo $! > frontend.pid

      - name: Wait for frontend
        run: |
          for i in {1..60}; do
            if curl -s http://127.0.0.1:5173 > /dev/null; then
              echo "Frontend is up"
              exit 0
            fi
            sleep 2
          done
          echo "Frontend did not start in time"
          exit 1

      - name: Run E2E tests
        working-directory: app_frameworks_front
        run: npx playwright test tests/e2e

      - name: Upload backend logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-logs
          path: app_frameworks/backend.log

      - name: Upload frontend logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-logs
          path: app_frameworks_front/frontend.log

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy blocked until all tests pass
        run: echo "All tests passed. Deployment can continue here."