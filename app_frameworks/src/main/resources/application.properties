# CONFIGURATION TO RUN LOCALLY WITH LOCAL DATABASE
spring.application.name=app_frameworks
server.port=8080
management.endpoints.web.exposure.include=health,info

# Database Configuration for local MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/app_frameworks?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:app_user}
spring.datasource.password=${DB_PASSWORD:mariva80}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver



#JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

